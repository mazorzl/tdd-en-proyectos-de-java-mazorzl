name: tests-and-merge.yml
on:
    push:
        branches:
            - main


permissions:
    contents: write

jobs:
    test-and-update:
        runs-on: ubuntu-latest
        steps:
            - name: Descargar el código
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0 # Necesario para descargar todas las ramas y poder fusionarlas

            - name: Preparar entorno Java 17
              uses: actions/setup-java@v3
              with:
                  java-version: '17'
                  distribution: 'temurin'

            - name: Ejecutar los tests
                # Ejecutamos los tests. Si esto falla, el robot se para aquí.
              run: mvn test

            - name: Fusionar código con la rama 'early'
                # Este paso SOLO se ejecuta si el comando anterior (los tests) ha tenido éxito
              if: success()
              run: |
                  git config --global user.name "GitHub Actions Bot"
                  git config --global user.email "actions@github.com"
                  git checkout early
                  git merge origin/main
                  git push origin early
